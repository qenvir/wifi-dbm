name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build standalone binary
        run: g++ -std=c++17 -O2 -o wifi-dbm standalone/wifi_signal.cpp

      - name: Build tests
        run: g++ -std=c++17 -o test_wifi_signal tests/test_wifi_signal.cpp

      - name: Run tests
        run: ./test_wifi_signal
