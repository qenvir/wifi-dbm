name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build standalone binary
        run: g++ -std=c++17 -O2 -o wifi-dbm standalone/wifi_signal.cpp

      - name: Build tests
        run: g++ -std=c++17 -o test_wifi_signal tests/test_wifi_signal.cpp

      - name: Run tests
        run: ./test_wifi_signal

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy — standalone
        run: |
          clang-tidy standalone/wifi_signal.cpp \
            --checks="cert-*,hicpp-*,bugprone-*,cppcoreguidelines-*,readability-*,performance-*" \
            --warnings-as-errors="" \
            -- -std=c++17

      - name: Run clang-tidy — shared-library
        run: |
          clang-tidy shared-library/wifi_signal.cpp \
            --checks="cert-*,hicpp-*,bugprone-*,cppcoreguidelines-*,readability-*,performance-*" \
            --warnings-as-errors="" \
            -- -std=c++17 -I shared-library/

      - name: Run clang-tidy — header-only
        run: |
          clang-tidy header-only/wifi_signal.h \
            --checks="cert-*,hicpp-*,bugprone-*,cppcoreguidelines-*,readability-*,performance-*" \
            --warnings-as-errors="" \
            -- -std=c++17 -x c++-header
